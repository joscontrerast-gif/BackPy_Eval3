services:
  mysql:
    image: mysql:8
    container_name: mysql-products
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: products_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: .
    container_name: backend-python
    restart: unless-stopped
    ports:
      - "8082:8082"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: products_db
      PORT: 8082
      FLASK_DEBUG: "true"

volumes:
  mysql_data: